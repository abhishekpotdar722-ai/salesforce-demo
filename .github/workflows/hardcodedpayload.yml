name: Extract Components and Trigger Tests

on:
  workflow_dispatch:

jobs:
  prepare-payload:
    runs-on: ubuntu-latest

    steps:
      - name: Hardcode Copado Payload
        id: payload
        run: |
          cat <<EOF > payload.json
          {
            "promotionName": "P00022",
            "userStory": "US-0000029",
            "status": "Completed",
            "environment": "a0cfn000001LzBBAA0",
            "metadataCount": 2,
            "componentsDeployed": [
              "Account.textfortesting__c",
              "Account.Dummy_testing__c",
              "Contact",
              "Flow",
              "Contact"
            ]
          }
          EOF

      - name: Convert Components to Test Tags
        id: tags
        run: |
      
          TAGS=""
          OBJECTS=""
      
          # Extract object names
          for comp in $(jq -r '.componentsDeployed[]' payload.json); do
            obj=$(echo "$comp" | cut -d'.' -f1)
            OBJECTS="$OBJECTS $obj"
          done
      
          # Get unique objects
          UNIQUE_OBJECTS=$(echo $OBJECTS | tr ' ' '\n' | sort -u)
      
          echo "Unique Objects:"
          echo "$UNIQUE_OBJECTS"
      
          # Generate lowercase object list
          for obj in $UNIQUE_OBJECTS; do
            TAGS="$TAGS $(echo $obj | tr '[:upper:]' '[:lower:]')"
          done
      
          # Count unique objects
          COUNT=$(echo "$UNIQUE_OBJECTS" | wc -l)
      
          # Add regression if >= 3 objects
          if [ "$COUNT" -ge 3 ]; then
            TAGS="$TAGS regression"
          fi
      
          # Normalize → remove duplicates → convert to comma-separated
          TAGS=$(echo $TAGS | tr ' ' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
      
          echo "Final Tags:"
          echo $TAGS
      
          echo "tags=$TAGS" >> $GITHUB_OUTPUT
      - name: Trigger Playwright Repo
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.PIPELINE_TRIGGER_TOKEN }}" \
          https://api.github.com/repos/abhishekpotdar722-ai/salesforce-cicd-pipeline/dispatches \
          -d '{
            "event_type": "copado",
            "client_payload": {
              "TEST_EXEC_INPUT_TYPE": "Label",
              "TEST_EXEC_INPUT_VALUE": "${{ steps.tags.outputs.tags }}"
            }
          }'
